<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <linearGradient id="node-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    
    <linearGradient id="node-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#bg-grad)" rx="16" />

  <g stroke="#334155" stroke-width="1.5" opacity="0.6">
    <line x1="80" y1="60" x2="160" y2="90" />
    <line x1="80" y1="60" x2="160" y2="150" />
    <line x1="80" y1="60" x2="160" y2="210" />
    <line x1="80" y1="120" x2="160" y2="90" />
    <line x1="80" y1="120" x2="160" y2="150" />
    <line x1="80" y1="120" x2="160" y2="210" />
    <line x1="80" y1="180" x2="160" y2="90" />
    <line x1="80" y1="180" x2="160" y2="150" />
    <line x1="80" y1="180" x2="160" y2="210" />
    <line x1="80" y1="240" x2="160" y2="90" />
    <line x1="80" y1="240" x2="160" y2="150" />
    <line x1="80" y1="240" x2="160" y2="210" />

    <line x1="160" y1="90" x2="240" y2="120" />
    <line x1="160" y1="90" x2="240" y2="180" />
    <line x1="160" y1="150" x2="240" y2="120" />
    <line x1="160" y1="150" x2="240" y2="180" />
    <line x1="160" y1="210" x2="240" y2="120" />
    <line x1="160" y1="210" x2="240" y2="180" />
  </g>

  <circle cx="240" cy="150" r="45" fill="#DB2777" opacity="0.15" filter="url(#glow)" />

  <g fill="url(#node-blue)">
    <circle cx="80" cy="60" r="6" />
    <circle cx="80" cy="120" r="6" />
    <circle cx="80" cy="180" r="6" />
    <circle cx="80" cy="240" r="6" />
  </g>

  <g fill="url(#node-blue)">
    <circle cx="160" cy="90" r="7" />
    <circle cx="160" cy="150" r="7" />
    <circle cx="160" cy="210" r="7" />
  </g>

  <g fill="url(#node-pink)">
    <circle cx="240" cy="120" r="9" />
    <circle cx="240" cy="180" r="9" />
  </g>

  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="310" y="160" font-size="96" font-weight="900" fill="url(#text-grad)" letter-spacing="2">RLL</text>
    
    <text x="315" y="200" font-size="16" font-weight="600" fill="#94A3B8" letter-spacing="5">REPRESENTATION LEARNING LAB</text>
    
    <line x1="315" y1="220" x2="420" y2="220" stroke="#DB2777" stroke-width="3" stroke-linecap="round" />
  </g>

</svg>
